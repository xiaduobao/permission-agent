server:
  port: 8080

spring:
  application:
    name: permission-agent
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:permission_agent}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:permission-agent-jwt-secret-key-change-in-production-2024}
    expiration-ms: 86400000
  ai:
    mock-enabled: ${AI_MOCK_ENABLED:true}
    api-key: ${AI_OPENAI_KEY:}
    base-url: ${AI_OPENAI_BASE_URL:https://api.openai.com}
    model: ${AI_MODEL:gpt-4o-mini}

logging:
  level:
    com.permission.agent: DEBUG
